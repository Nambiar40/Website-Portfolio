    <div class="mt-3">
      <input type="text" id="new-skill" class="form-control" placeholder="Enter new skill">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Global validation function for skill inputs
    function validateSkillInput(input) {
      // Remove existing error message
      const existingError = input.parentNode.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }

      if (input.value.trim() === '') {
        input.style.borderColor = 'red';
        // Create and insert error message
        const errorSpan = document.createElement('span');
        errorSpan.className = 'text-danger error-message';
        errorSpan.textContent = 'This field is required';
        input.parentNode.insertBefore(errorSpan, input.nextSibling);
      } else {
        input.style.borderColor = 'green';
      }
    }

    // Real-time validation for new skill input
    document.addEventListener('DOMContentLoaded', function() {
      const skillInput = document.getElementById('new-skill');

      skillInput.addEventListener('input', function() { validateSkillInput(this); });

      // Initial validation
      validateSkillInput(skillInput);
    });

    function addSkill() {
      const skillInput = document.getElementById('new-skill');

      // Reset previous warnings
      skillInput.style.borderColor = '';

      // Remove existing error message
      const existingError = skillInput.parentNode.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }

      if (skillInput.value.trim() !== '') {
        // Skill is valid, add to list
        const skillsContainer = document.getElementById('skills-container');
        const newSkillDiv = document.createElement('div');
        newSkillDiv.className = 'border rounded p-3 mb-3';
        newSkillDiv.innerHTML = `
          <div class="mb-2">
            <label class="form-label fw-bold">Skill Name</label>
            <div class="border rounded p-2 bg-light">${skillInput.value.trim()}</div>
          </div>
        `;
        skillsContainer.appendChild(newSkillDiv);
        skillInput.value = '';
        alert("Skill added successfully!");
      } else {
        skillInput.style.borderColor = 'red';
        // Create and insert error message
        const errorSpan = document.createElement('span');
        errorSpan.className = 'text-danger error-message';
        errorSpan.textContent = 'This field is required';
        skillInput.parentNode.insertBefore(errorSpan, skillInput.nextSibling);
        alert("Please enter a skill name.");
      }
    }

    function editSkills() {
      const skillsContainer = document.getElementById('skills-container');
      const skillDivs = skillsContainer.querySelectorAll('.border.rounded.p-3.mb-3');
      const editBtn = document.getElementById('edit-skills-btn');
      const saveBtn = document.getElementById('save-skills-btn');

      skillDivs.forEach(div => {
        const skillText = div.querySelector('.bg-light').textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control';
        input.value = skillText;
        div.querySelector('.bg-light').replaceWith(input);

        // Add validation event listener
        input.addEventListener('input', function() { validateSkillInput(this); });
        // Initial validation
        validateSkillInput(input);
      });

      editBtn.style.display = 'none';
      saveBtn.style.display = 'inline-block';
    }

    function saveSkills() {
      const skillsContainer = document.getElementById('skills-container');
      const skillDivs = skillsContainer.querySelectorAll('.border.rounded.p-3.mb-3');
      const editBtn = document.getElementById('edit-skills-btn');
      const saveBtn = document.getElementById('save-skills-btn');

      skillDivs.forEach(div => {
        const input = div.querySelector('input');
        const skillText = input.value.trim();
        const displayDiv = document.createElement('div');
        displayDiv.className = 'border rounded p-2 bg-light';
        displayDiv.textContent = skillText;
        input.replaceWith(displayDiv);
      });

      saveBtn.style.display = 'none';
      editBtn.style.display = 'inline-block';
      alert("Skills saved successfully!");
    }
  </script>
