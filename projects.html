        </ul>

  <div class="container mt-4">
    <h3>Projects</h3>
    <div id="project-list">
      <div class="border p-3 mt-3 project-item">
        <div class="mb-2">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-control project-title" value="Website Locker" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Description</label>
          <textarea class="form-control project-desc" readonly>A Chrome Extension + Django project designed to lock access to websites (like Gmail) until the user successfully authenticates.</textarea>
        </div>
        <div class="mb-2">
          <button class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
        </div>
      </div>
      <div class="border p-3 mt-3 project-item">
        <div class="mb-2">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-control project-title" value="E-Commerce Website" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Description</label>
          <textarea class="form-control project-desc" readonly>A Django-powered online shopping platform with product listings, cart, and secure checkout.</textarea>
        </div>
        <div class="mb-2">
          <button class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
        </div>
      </div>
      <div class="border p-3 mt-3 project-item">
        <div class="mb-2">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-control project-title" value="Tatkal Ticket Auto-booker" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Description</label>
          <textarea class="form-control project-desc" readonly>An automation system for booking IRCTC Tatkal tickets using Python, Django, and Selenium.</textarea>
        </div>
        <div class="mb-2">
          <button class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
        </div>
      </div>
      <div class="border p-3 mt-3 project-item">
        <div class="mb-2">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-control project-title" value="Chat Application" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Description</label>
          <textarea class="form-control project-desc" readonly>A real-time chat app built with Django Channels and WebSockets.</textarea>
        </div>
        <div class="mb-2">
          <button class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
        </div>
      </div>
    </div>

    <button class="btn btn-secondary mt-3" onclick="addProject()">Add Project</button>
    <button class="btn btn-primary btn-sm mt-3" onclick="saveProject()">Save</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle edit mode for project section
    function toggleEdit(button) {
      const projectItem = button.closest('.project-item');
      const inputs = projectItem.querySelectorAll('input, textarea');

      inputs.forEach(input => {
        if (input.hasAttribute('readonly')) {
          input.removeAttribute('readonly');
        } else {
          input.setAttribute('readonly', 'readonly');
        }
      });

      button.textContent = button.textContent === 'Edit' ? 'Save' : 'Edit';
    }

    // Real-time validation for project inputs
    document.addEventListener('DOMContentLoaded', function() {
      const projectItems = document.querySelectorAll('.project-item');

      projectItems.forEach(item => {
        const titleInput = item.querySelector('.project-title');
        const descTextarea = item.querySelector('.project-desc');

        function validateInput(input) {
          // Remove existing error message
          const existingError = input.parentNode.querySelector('.error-message');
          if (existingError) {
            existingError.remove();
          }

          if (input.value.trim() === '') {
            input.style.borderColor = 'red';
            // Create and insert error message
            const errorSpan = document.createElement('span');
            errorSpan.className = 'text-danger error-message';
            errorSpan.textContent = 'This field is required';
            input.parentNode.insertBefore(errorSpan, input.nextSibling);
          } else {
            input.style.borderColor = 'green';
          }
        }

        titleInput.addEventListener('input', function() { validateInput(this); });
        descTextarea.addEventListener('input', function() { validateInput(this); });

        // Initial validation
        validateInput(titleInput);
        validateInput(descTextarea);
      });
    });

    function saveNewProject(button) {
      const projectItem = button.closest('.project-item');
      const titleInput = projectItem.querySelector('.project-title');
      const descTextarea = projectItem.querySelector('.project-desc');

      const title = titleInput.value.trim();
      const desc = descTextarea.value.trim();

      if (!title || !desc) {
        alert('Please fill in both project name and description');
        return;
      }
    }
  </script>
</body>
</html>
