<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Portfolio sections - Hero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Edit Portfolio Sections</a>
      <div>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="hero.html">Hero</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="education.html">Education</a></li>
          <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <button class="btn btn-outline-danger btn-sm ms-3" onclick="location.href='login.html'">Logout</button>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3>Hero Section</h3>
    <form id="heroForm" class="border p-3 mt-3 hero-item">
      <div class="mb-3">
        <label class="form-label">Name/Title</label>
        <input type="text" name="name" class="form-control hero-name" value="Hi, Yedunandan Nambiar Here!" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input type="text" name="title" class="form-control hero-title" value="Data Analyst" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control hero-desc" value="Welcome to My Portfolio" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label">Profile Image URL</label>
        <input type="text" name="image" class="form-control hero-image" value="images/yedu-portfolio.jpg" readonly>
      </div>
      <div class="mb-2">
        <button type="button" class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
      </div>
      <button type="submit" class="btn btn-primary btn-sm mt-3">Save</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle edit mode for hero section
    function toggleEdit(button) {
      const heroItem = button.closest('.hero-item');
      const inputs = heroItem.querySelectorAll('input');

      inputs.forEach(input => {
        if (input.hasAttribute('readonly')) {
          input.removeAttribute('readonly');
        } else {
          input.setAttribute('readonly', 'readonly');
        }
      });

      // Toggle button text for clarity
      button.textContent = button.textContent === 'Edit' ? 'Lock' : 'Edit';
    }

    // Real-time validation for hero inputs
    document.addEventListener('DOMContentLoaded', function() {
      const nameInput = document.querySelector('.hero-name');
      const titleInput = document.querySelector('.hero-title');
      const descInput = document.querySelector('.hero-desc');
      const imageInput = document.querySelector('.hero-image');

      function validateInput(input) {
        // Remove existing error message
        const existingError = input.parentNode.querySelector('.error-message');
        if (existingError) {
          existingError.remove();
        }

        if (input.value.trim() === '') {
          input.style.borderColor = 'red';
          // Create and insert error message
          const errorSpan = document.createElement('span');
          errorSpan.className = 'text-danger error-message';
          errorSpan.textContent = 'This field is required';
          input.parentNode.insertBefore(errorSpan, input.nextSibling);
        } else {
          input.style.borderColor = 'green';
        }
      }

      nameInput.addEventListener('input', function() { validateInput(this); });
      titleInput.addEventListener('input', function() { validateInput(this); });
      descInput.addEventListener('input', function() { validateInput(this); });
      imageInput.addEventListener('input', function() { validateInput(this); });

      // Initial validation
      validateInput(nameInput);
      validateInput(titleInput);
      validateInput(descInput);
      validateInput(imageInput);

      // Load hero data from database
      fetch('load_hero.php')
        .then(response => response.json())
        .then(data => {
          if (data.name) {
            document.querySelector('.hero-name').value = data.name;
            document.querySelector('.hero-title').value = data.title;
            document.querySelector('.hero-desc').value = data.description;
            document.querySelector('.hero-image').value = data.image;
          }
        })
        .catch(error => console.error('Error loading hero:', error));

      // Form submission handler
      document.getElementById("heroForm").addEventListener("submit", async function(e){
        e.preventDefault();

        let formData = new FormData(this);

        try {
          const response = await fetch("save_hero.php", {
            method: "POST",
            body: formData
          });

          // Always try to parse JSON, but handle non-JSON responses gracefully
          const text = await response.text();
          let res;
          try {
            res = JSON.parse(text);
          } catch(parseErr) {
            console.error('Non-JSON response:', text);
            alert('Server returned an unexpected response. Check console for details.');
            return;
          }

          console.log("Server:", res);

          alert(res.message);
        }
        catch(err){
          console.error("Error:", err);
          alert('An error occurred while saving. See console for details.');
        }
      });
    });

    // Save hero data
    function saveHero() {
      const nameInput = document.querySelector('.hero-name');
      const titleInput = document.querySelector('.hero-title');
      const descInput = document.querySelector('.hero-desc');
      const imageInput = document.querySelector('.hero-image');

      const hero = {
        name: nameInput.value.trim(),
        title: titleInput.value.trim(),
        description: descInput.value.trim(),
        image: imageInput.value.trim()
      };

      // Reset previous warnings
      nameInput.style.borderColor = '';
      titleInput.style.borderColor = '';
      descInput.style.borderColor = '';
      imageInput.style.borderColor = '';

      let valid = true;

      if (!hero.name) {
        nameInput.style.borderColor = 'red';
        valid = false;
      }
      if (!hero.title) {
        titleInput.style.borderColor = 'red';
        valid = false;
      }
      if (!hero.description) {
        descInput.style.borderColor = 'red';
        valid = false;
      }
      if (!hero.image) {
        imageInput.style.borderColor = 'red';
        valid = false;
      }

      if (!valid) {
        alert("Please fill in all fields: Name, Job Title, Description, and Profile Image URL.");
        return;
      }

      // Send data to server
      fetch('save_hero.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(hero)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert(data.message);
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('An error occurred while saving.');
      });
    }
  </script>
</body>
</html>
