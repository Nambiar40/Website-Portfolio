          <input type="text" class="form-control education-institution" value="Chinmaya Vidyalaya Kannur" readonly>

        <div class="mb-2">
          <label class="form-label">Year</label>
          <input type="text" class="form-control education-year" value="2023" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Result/Grade</label>
          <input type="text" class="form-control education-result" value="75%" readonly>
        </div>
        <div class="mb-2">
          <button class="btn btn-sm btn-info" onclick="toggleEdit(this)">Edit</button>
        </div>
      </div>
      <div class="border p-3 mt-3 education-item">
        <div class="mb-2">
          <label class="form-label">Degree/Program</label>
          <input type="text" class="form-control education-degree" value="10th Grade [CBSE]" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Institution</label>
          <input type="text" class="form-control education-institution" value="Kendriya Vidyalaya" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Year</label>
          <input type="text" class="form-control education-year" value="2021" readonly>

          <input type="text" class="form-control education-result" value="85%" readonly>

    <div class="mt-2">
      <button class="btn btn-warning btn-sm" id="edit-education">Edit</button>
      <button class="btn btn-secondary btn-sm" id="add-education">Add Education</button>
      <button class="btn btn-primary btn-sm" id="save-education">Save Education</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle edit mode for education section
    function toggleEdit(button) {
      const educationItem = button.closest('.education-item');
      const inputs = educationItem.querySelectorAll('input');

      inputs.forEach(input => {
        if (input.hasAttribute('readonly')) {
          input.removeAttribute('readonly');
        } else {
          input.setAttribute('readonly', 'readonly');
        }
      });

      button.textContent = button.textContent === 'Edit' ? 'Save' : 'Edit';
    }

    // Real-time validation for education inputs
    document.addEventListener('DOMContentLoaded', function() {
      const educationItems = document.querySelectorAll('.education-item');

      educationItems.forEach(item => {
        const degreeInput = item.querySelector('.education-degree');
        const institutionInput = item.querySelector('.education-institution');
        const yearInput = item.querySelector('.education-year');
        const resultInput = item.querySelector('.education-result');

        function validateInput(input) {
          // Remove existing error message
          const existingError = input.parentNode.querySelector('.error-message');
          if (existingError) {
            existingError.remove();
          }

          if (input.value.trim() === '') {
            input.style.borderColor = 'red';
            // Create and insert error message
            const errorSpan = document.createElement('span');
            errorSpan.className = 'text-danger error-message';
            errorSpan.textContent = 'This field is required';
            input.parentNode.insertBefore(errorSpan, input.nextSibling);
          } else {
            input.style.borderColor = 'green';
          }
        }

        degreeInput.addEventListener('input', function() { validateInput(this); });
        institutionInput.addEventListener('input', function() { validateInput(this); });
        yearInput.addEventListener('input', function() { validateInput(this); });
        resultInput.addEventListener('input', function() { validateInput(this); });

        // Initial validation
        validateInput(degreeInput);
        validateInput(institutionInput);
        validateInput(yearInput);
        validateInput(resultInput);
      });
    });

    // Save new education
    function saveNewEducation(button) {
      const educationItem = button.closest('.education-item');
      const degreeInput = educationItem.querySelector('.education-degree');
      const institutionInput = educationItem.querySelector('.education-institution');
      const yearInput = educationItem.querySelector('.education-year');
      const resultInput = educationItem.querySelector('.education-result');

      const degree = degreeInput.value.trim();
      const institution = institutionInput.value.trim();
      const year = yearInput.value.trim();
      const result = resultInput.value.trim();

      if (!degree || !institution || !year || !result) {
        alert('Please fill in all fields');
        return;
      }
    }
  </script>
</body>
