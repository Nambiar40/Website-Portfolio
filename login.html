<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body">
      <div class="text-center mb-4">
        <h3 class="card-title" id="form-title">Admin Login</h3>
        <p class="text-muted" id="form-subtitle">Sign in to access your admin panel</p>
      </div>

      <!-- Toggle buttons -->
      <div class="btn-group w-100 mb-4" role="group">
        <input type="radio" class="btn-check" name="auth-mode" id="login-mode" autocomplete="off" checked>
        <label class="btn btn-outline-primary" for="login-mode" onclick="toggleMode('login')">Login</label>

        <input type="radio" class="btn-check" name="auth-mode" id="signup-mode" autocomplete="off">
        <label class="btn btn-outline-primary" for="signup-mode" onclick="toggleMode('signup')">Sign Up</label>
      </div>
      <!-- Login Form -->
      <form id="login-form" style="display: block;">
        <div class="mb-3">
          <label for="login-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="login-username" name="username" required>
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" style="display: none;">
        <div class="mb-3">
          <label for="signup-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="signup-username" name="username" required minlength="3">
          <div class="form-text" id="username-feedback"></div>
        </div>

        <div class="mb-3">
          <label for="signup-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="signup-password" name="password" required minlength="6">
        </div>
        <div class="mb-3">
          <label for="signup-confirm-password" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="signup-confirm-password" name="confirmPassword" required>
          <div class="form-text" id="password-feedback"></div>
        </div>
        <button type="submit" class="btn btn-success w-100">Sign Up</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>


  <script>
    // Real-time validation for login inputs
    document.addEventListener('DOMContentLoaded', function() {
      const loginUsernameInput = document.getElementById('login-username');
      const loginPasswordInput = document.getElementById('login-password');
      const signupUsernameInput = document.getElementById('signup-username');
      const signupPasswordInput = document.getElementById('signup-password');
      const signupConfirmPasswordInput = document.getElementById('signup-confirm-password');

      function validateInput(input) {
        // Remove existing error message
        const existingError = input.parentNode.querySelector('.error-message');
        if (existingError) {
          existingError.remove();
        }

        if (input.value.trim() === '') {
          input.style.borderColor = 'red';
          // Create and insert error message
          const errorSpan = document.createElement('span');
          errorSpan.className = 'text-danger error-message';
          errorSpan.textContent = 'This field is required';
          input.parentNode.insertBefore(errorSpan, input.nextSibling);
        } else {
          input.style.borderColor = 'green';
        }
      }

      // Login inputs
      loginUsernameInput.addEventListener('input', function() { validateInput(this); });
      loginPasswordInput.addEventListener('input', function() { validateInput(this); });

      // Signup inputs
      signupUsernameInput.addEventListener('input', function() { validateInput(this); });
      signupPasswordInput.addEventListener('input', function() { validateInput(this); });
      signupConfirmPasswordInput.addEventListener('input', function() { validateInput(this); });

      // Initial validation
      validateInput(loginUsernameInput);
      validateInput(loginPasswordInput);
      validateInput(signupUsernameInput);
      validateInput(signupPasswordInput);
      validateInput(signupConfirmPasswordInput);
    });

    // Login form submission
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const usernameInput = document.getElementById('login-username');
      const passwordInput = document.getElementById('login-password');

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      // Reset previous warnings
      usernameInput.style.borderColor = '';
      passwordInput.style.borderColor = '';

      let valid = true;

      if (!username) {
        usernameInput.style.borderColor = 'red';
        valid = false;
      }
      if (!password) {
        passwordInput.style.borderColor = 'red';
        valid = false;
      }

      if (!valid) {
        alert("Please enter both username and password.");
        return;
      }

       // Call the login function from admin.js
  if (window.login && typeof window.login === 'function' && window.login(username, password)) {

    window.location.href = 'hero.html'; // or 'index.html#hero' if it's a section on the same page
  } else {
    alert('Invalid credentials. Please try again.');
  }
});

    // Real-time username validation
    document.getElementById('signup-username').addEventListener('input', function() {
      const username = this.value;
      const feedback = document.getElementById('username-feedback');

      if (username.length < 3) {
        feedback.textContent = 'Username must be at least 3 characters long';
        feedback.style.color = 'red';
      } else if (window.isUsernameAvailable && typeof window.isUsernameAvailable === 'function' && !window.isUsernameAvailable(username)) {
        feedback.textContent = 'Username already exists';
        feedback.style.color = 'red';
      } else {
        feedback.textContent = 'Username is available';
        feedback.style.color = 'green';
      }
    });

    // Real-time password confirmation validation
    document.getElementById('signup-confirm-password').addEventListener('input', function() {
      const password = document.getElementById('signup-password').value;
      const confirmPassword = this.value;
      const feedback = document.getElementById('password-feedback');

      if (password !== confirmPassword) {
        feedback.textContent = 'Passwords do not match';
        feedback.style.color = 'red';
      } else {
        feedback.textContent = 'Passwords match';
        feedback.style.color = 'green';
      }
    });
  </script>
</body>
</html>
